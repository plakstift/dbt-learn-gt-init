sources:
  - name: jaffle_shop
    description: A clone of a Postgres database
    database: raw
    schema: jaffle_shop
    tables:
      - name: customers
        description: Raw customers data
        columns:
          - name: id
            description: primary key
            tests:
              - not_null
              - unique 
      - name: orders
        columns:
          - name: id
            tests:
              - not_null
              - unique       
        config:
          freshness:
            warn_after:
              count: 12
              period: hour
            error_after: 
              count: 1
              period: day
          loaded_at_field: _etl_loaded_at
  
  - name: stripe
    database: raw
    schema: stripe
    tables:
      - name: payments
        config:
          freshness:
            warn_after:
              count: 12
              period: hour
            error_after: 
              count: 1
              period: day
          loaded_at_field: _batched_at